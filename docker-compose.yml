version: '3.8'

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    AIRFLOW_UID: ${AIRFLOW_UID:-50000}
    PYTHONPATH: /opt/airflow
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/logs:/opt/airflow/logs
    - ./scraping:/opt/airflow/scraping
    - ./scraping/data/raw_html:/opt/airflow/scraping/data/raw_html
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - brasileirao-net

services:

  # ─────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: brasileirao_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - brasileirao-net

  # ─────────────────────────────────────────
  # PgAdmin
  # ─────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: brasileirao_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - brasileirao-net

  # ─────────────────────────────────────────
  # Airflow — Init (roda uma vez)
  # ─────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: brasileirao_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db upgrade
        airflow users create \
          --username airflow \
          --password airflow \
          --firstname Brasileirao \
          --lastname Pipeline \
          --role Admin \
          --email airflow@brasileirao.com
    restart: on-failure
    networks:
      - brasileirao-net

  # ─────────────────────────────────────────
  # Airflow — Webserver
  # ─────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: brasileirao_airflow_webserver
    restart: unless-stopped
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ─────────────────────────────────────────
  # Airflow — Scheduler
  # ─────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: brasileirao_airflow_scheduler
    restart: unless-stopped
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $(hostname)"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  pgdata:
  pgadmin_data:

networks:
  brasileirao-net:
    driver: bridge